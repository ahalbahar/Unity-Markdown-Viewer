name: Release Unity Package

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Optional version label for manual package builds'
        required: false
        default: ''
        type: string

jobs:
  build-package:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            # Normalize: ensure the version always carries a v prefix
            RAW="${{ github.event.inputs.version }}"
            VERSION="${RAW#v}"
            VERSION="v${VERSION}"
          else
            # Auto-detect the latest version from CHANGELOG if no version is provided in a manual run
            LATEST_VERSION_RAW=$(grep -m 1 '## \[' CHANGELOG.md | sed -E 's/.*\[([^]]+)\].*/\1/')
            if [[ -n "${LATEST_VERSION_RAW}" ]]; then
               VERSION="v${LATEST_VERSION_RAW}"
               echo "Auto-detected latest version ${VERSION} from CHANGELOG"
            else
               VERSION="manual-${GITHUB_RUN_NUMBER}"
            fi
          fi

          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Stage package contents
        shell: bash
        run: |
          set -euo pipefail

          STAGING_ROOT="staging"
          PACKAGE_ROOT="${STAGING_ROOT}/Assets/AB/Unity-Markdown-Viewer"

          rm -rf "${STAGING_ROOT}" dist
          mkdir -p "${PACKAGE_ROOT}" dist

          # CHANGED: Replace rsync with portable tar staging so local act runs do not depend on extra packages in the runner image (2026-04-11)
          tar \
            --exclude='./.git' \
            --exclude='./.github' \
            --exclude='./PackageBuilds' \
            --exclude='./tools' \
            --exclude='./CONTRIBUTING.md' \
            --exclude='./CONTRIBUTING.md.meta' \
            --exclude='./CODE_QUALITY_FINDINGS.md' \
            --exclude='./CODE_QUALITY_FINDINGS.md.meta' \
            --exclude='./.act-artifacts' \
            --exclude='./act-artifacts' \
            --exclude='./staging' \
            --exclude='./dist' \
            -cf - . | tar -xf - -C "${PACKAGE_ROOT}"

          ensure_folder_meta() {
            local folder_path="$1"
            local meta_path="${folder_path}.meta"

            if [[ -f "${meta_path}" ]]; then
              return
            fi

            local guid
            guid="$(printf 'Unity-Markdown-Viewer:%s' "${folder_path}" | md5sum | awk '{print $1}')"

            printf '%s\n' \
              'fileFormatVersion: 2' \
              "guid: ${guid}" \
              'folderAsset: yes' \
              'DefaultImporter:' \
              '  externalObjects: {}' \
              '  userData:' \
              '  assetBundleName:' \
              '  assetBundleVariant:' > "${meta_path}"
          }

          # CHANGED: Create deterministic folder meta files for the staged Unity folder chain because the repository root itself is not a Unity asset folder with committed metas (2026-04-11)
          mkdir -p "${STAGING_ROOT}/Assets/AB"
          ensure_folder_meta "${STAGING_ROOT}/Assets"
          ensure_folder_meta "${STAGING_ROOT}/Assets/AB"
          ensure_folder_meta "${PACKAGE_ROOT}"

      - name: Collect staged package files
        id: staged_files
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t staged_files < <(
            find staging/Assets/AB/Unity-Markdown-Viewer \
              -type f \
              ! -name '*.meta' \
              ! -name 'CONTRIBUTING.md' \
              ! -name 'CODE_QUALITY_FINDINGS.md' \
              | sort
          )

          valid_files=()
          skipped_files=()

          for staged_file in "${staged_files[@]}"; do
            if [[ -f "${staged_file}.meta" ]]; then
              valid_files+=("${staged_file}")
            else
              skipped_files+=("${staged_file}")
            fi
          done

          if [[ ${#skipped_files[@]} -gt 0 ]]; then
            printf 'Skipping staged files without Unity .meta sidecars:\n' >&2
            printf ' - %s\n' "${skipped_files[@]}" >&2
          fi

          if [[ ${#valid_files[@]} -eq 0 ]]; then
            echo 'No staged package files with matching .meta sidecars were found.' >&2
            exit 1
          fi

          # CHANGED: Keep the action input limited to staged files that still have matching Unity .meta sidecars so create-unitypackage cannot fail on control files such as .gitignore (2026-04-20)
          {
            echo 'files<<EOF'
            printf '%s\n' "${valid_files[@]}"
            echo 'EOF'
          } >> "${GITHUB_OUTPUT}"

      - name: Create unitypackage
        # CHANGED: Pin to the latest published create-unitypackage release so CI matches the current action behavior (2026-04-11)
        uses: natsuneko-laboratory/create-unitypackage@v3.2.0
        with:
          root: staging
          files: ${{ steps.staged_files.outputs.files }}
          dest: dist/Unity-Markdown-Viewer-${{ steps.version.outputs.version }}.unitypackage

      - name: Verify exported package
        shell: bash
        run: |
          test -f "dist/Unity-Markdown-Viewer-${{ steps.version.outputs.version }}.unitypackage"

      - name: Create release notes
        id: release_notes
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ steps.version.outputs.version }}"
          VERSION_RAW="${VERSION#v}"
          NOTES_CONTENT_PATH="notes_content.txt"

          # CHANGED: Keep manual builds green even when the requested version is not yet in CHANGELOG.md by using a zero-match-safe filter pipeline (2026-04-20)
          awk -v ver="## [${VERSION_RAW}]" '
            index($0, ver) == 1 { p=1; next }
            p && /^## / { exit }
            p { print }
          ' CHANGELOG.md \
            | sed -e '/./,$!d' -e :a -e '/^[[:space:]]*$/{$d;N;ba}' -e '/^---$/d' \
            > "${NOTES_CONTENT_PATH}"

          {
            if [ -s "${NOTES_CONTENT_PATH}" ]; then
              # Wrap body in a collapsible details block for GitHub UI
              echo "<details>"
              echo "<summary><b>Unity Markdown Viewer ${VERSION} — Click to expand release notes</b></summary>"
              echo ""
              cat "${NOTES_CONTENT_PATH}"
              echo ""
              echo "</details>"
            else
              echo "## ${VERSION}"
              echo ""
              echo "Release notes for ${VERSION} of Unity Markdown Viewer."
            fi

            echo ""
            echo "---"
            echo "**Full Changelog**: [See CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)"
          } > release_notes.txt

          echo "Generated Release Notes:"
          cat release_notes.txt

      - name: Create GitHub release
        # Only runs on tag pushes — GitHub Releases always requires an existing tag
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Unity Markdown Viewer ${{ steps.version.outputs.version }}
          files: dist/Unity-Markdown-Viewer-${{ steps.version.outputs.version }}.unitypackage
          body_path: release_notes.txt
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, 'alpha') || contains(steps.version.outputs.version, 'beta') || contains(steps.version.outputs.version, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: Unity-Markdown-Viewer-${{ steps.version.outputs.version }}
          path: dist/Unity-Markdown-Viewer-${{ steps.version.outputs.version }}.unitypackage
          retention-days: 30
